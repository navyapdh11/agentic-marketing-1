version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hermes_crm
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes123
    ports: ['5432:5432']
    volumes: ['./data/postgres:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hermes']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s

  backend:
    build: ./backend
    restart: always
    ports: ['8000:8000']
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    labels:
      traefik.enable: 'true'
      traefik.http.routers.backend.rule: 'Host(`localhost`) && PathPrefix(`/api`)'

  seo-engine:
    build: ./packages/seo-engine
    restart: always
    ports: ['8501:8501']
    volumes: ['./packages/seo-engine/data:/app/data']
    environment:
      - SCRAPINGDOG_KEY=demo
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8501/health']
      interval: 30s

  avoid-ai-agent:
    build: ./packages/avoid-ai-agent
    restart: always
    ports: ['8502:8501']
    volumes: ['./packages/avoid-ai-agent/data:/app/data']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8501/health']
      interval: 30s

  ml-marketing-agent:
    build: ./packages/ml-marketing-agent
    restart: always
    ports: ['8503:8503']
    volumes:
      - './packages/ml-marketing-agent/models:/app/models'
      - './packages/ml-marketing-agent/output:/app/output'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8503/_stcore/health']
      interval: 30s

  grafana:
    image: grafana/grafana:10.4.7-oss
    restart: always
    ports: ['3001:3000']
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - ./grafana:/etc/grafana/provisioning/dashboards
      - grafana-storage:/var/lib/grafana
    depends_on: [prometheus]

  prometheus:
    image: prom/prometheus:v2.51.0
    ports: ['9090:9090']
    volumes: ['./prometheus.yml:/etc/prometheus/prometheus.yml']

volumes:
  grafana-storage:
